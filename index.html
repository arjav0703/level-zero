<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/firacode/6.2.0/fira_code.min.css" />
  <link rel="icon" type="image/png" href="https://cdn.hackclub.com/019d0aee-dfcb-7e1e-a336-906df24e0655/image.png" />
  <link data-trunk rel="rust" />
  <title>Level Zero</title>
  <style>
    body {
      margin: 0;
      width: 100%;
      height: 210vh;
      background-color: #121212;
    }

    pre {
      font-family: "Fira Code", monospace;
      height: 200vh;
      font-size: 16px;
      margin: auto;
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 1rem;
      background-color: #121212;
      color: #888;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    footer.show {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>

<body>
  <!-- (optional) subscribe to the application started event -->
  <script type="module">
    window.addEventListener("TrunkApplicationStarted", (_) => {
      // #[wasm_bindgen] functions are now bound to window.wasmBindings.*
      console.log("application initialized");
    });

    function handleScroll() {
      const footer = document.querySelector('footer');
      const scrollHeight = document.documentElement.scrollHeight;
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      const clientHeight = document.documentElement.clientHeight;

      if (scrollTop + clientHeight >= scrollHeight - 200) {
        footer.classList.add('show');
      } else {
        footer.classList.remove('show');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      window.addEventListener('scroll', handleScroll);
      handleScroll();
    });
  </script>
  <script>
    window.si = window.si || function () {(window.siq = window.siq || []).push(arguments);};
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>


  <footer>
    Made with ❤️ by Arjav. Open source at <a
      href="https://github.com/arjav0703/level-zero">github.com/arjav0703/level-zero</a>.
  </footer>
</body>

</html>
